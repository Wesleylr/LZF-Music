name: Build and Release Flutter App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # --- Apple 平台: macOS + iOS ---
  build-apple:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install Tools
        run: |
          dart pub global activate fastforge
          npm install -g appdmg

      - name: Get Flutter version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 使用循环按顺序构建3个架构
      - name: Build macOS DMGs (Sequential)
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          PBXPROJ="macos/Runner.xcodeproj/project.pbxproj"
          mkdir -p macos_artifacts
          
          # 定义要构建的架构列表
          ARCHS=("x86_64" "arm64" "universal")
          
          for ARCH in "${ARCHS[@]}"; do
            echo "----------------------------------------"
            echo "🏗️ Starting build for: $ARCH"
            echo "----------------------------------------"
            
            # 1. 清理旧构建 (切换架构前必须清理，否则会混淆)
            flutter clean
            flutter pub get
            
            # 2. 修改 project.pbxproj 的 EXCLUDED_ARCHS
            if [[ "$ARCH" == "universal" ]]; then
              sed -i '' 's/EXCLUDED_ARCHS = .*;/EXCLUDED_ARCHS = "";/g' "$PBXPROJ"
            elif [[ "$ARCH" == "x86_64" ]]; then
              sed -i '' 's/EXCLUDED_ARCHS = .*;/EXCLUDED_ARCHS = "arm64";/g' "$PBXPROJ"
            elif [[ "$ARCH" == "arm64" ]]; then
              sed -i '' 's/EXCLUDED_ARCHS = .*;/EXCLUDED_ARCHS = "x86_64";/g' "$PBXPROJ"
            fi
            
            # 3. 执行打包
            fastforge package --platform macos --targets dmg
            
            # 4. 重命名并移动产物
            # fastforge 默认生成在 dist/版本号/lzf_music-版本号-macos.dmg
            SRC="dist/$VERSION/lzf_music-$VERSION-macos.dmg"
            DST="macos_artifacts/LZF-Music-$VERSION-macos-$ARCH.dmg"
            
            if [[ -f "$SRC" ]]; then
              mv "$SRC" "$DST"
              echo "✅ Build success: $DST"
            else
              echo "❌ Build failed for $ARCH"
              exit 1
            fi
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmgs
          path: macos_artifacts/*.dmg
          retention-days: 1

      # ==========================================
      # 2. 构建 iOS
      # ==========================================
      - name: Clean before iOS build
        run: |
          flutter clean
          flutter pub get

      - name: Build iOS (No Codesign)
        run: |
          # --no-codesign 允许在没有证书的情况下构建 release 包
          flutter build ios --release --no-codesign

      - name: Package iOS IPA
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          mkdir -p dist_ios
          mkdir -p Payload

          # 复制 Runner.app 到 Payload
          cp -r build/ios/iphoneos/Runner.app Payload/

          # 压缩生成 IPA
          zip -r "dist_ios/LZF-Music-$VERSION-ios.ipa" Payload

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: dist_ios/*.ipa
          retention-days: 1

  # --- 桌面端: Windows ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install Inno Setup 6
        run: |
          $url = "https://jrsoftware.org/download.php/is.exe"
          $output = "${{ runner.temp }}\innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $output
          Start-Process -FilePath $output -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART" -Wait
          $innoPath = "C:\Program Files (x86)\Inno Setup 6"
          echo "$innoPath" >> $env:GITHUB_PATH

      - name: Copy Chinese language pack
        run: |
          $sourceFile = "windows\packaging\exe\ChineseSimplified.isl"
          $targetDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          $targetFile = "$targetDir\ChineseSimplified.isl"
          if (Test-Path $sourceFile) { Copy-Item $sourceFile $targetFile -Force }

      - name: Install fastforge
        run: dart pub global activate fastforge

      - name: Get Flutter version
        id: get_version
        run: |
          $VERSION = (Get-Content pubspec.yaml | Select-String "version:" | ForEach-Object { $_ -replace "version:\s*", "" } | ForEach-Object { $_ -replace "\+.*", "" })
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT

      - name: Package Windows exe
        run: fastforge package --platform windows --targets exe

      - name: Rename Windows installer
        run: |
          $VERSION = "${{ steps.get_version.outputs.version }}"
          $DIST_DIR = "dist\$VERSION"
          $INSTALLER_NAME = "LZF-Music-$VERSION-windows-x64-setup.exe"
          Get-ChildItem "$DIST_DIR" -Filter "*.exe" | ForEach-Object {
            Copy-Item $_.FullName $INSTALLER_NAME -Force
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: LZF-Music-${{ steps.get_version.outputs.version }}-windows-x64-setup.exe
          retention-days: 1

  # --- Android 平台 ---
  build-android:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Get Flutter version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - run: flutter pub get

      # ==========================================
      # 1. 构建 Android
      # ==========================================
      - name: Build Android APKs
        run: |
          # 1. 构建 Universal 包
          flutter build apk --release
          # 2. 构建分架构包
          flutter build apk --release --split-per-abi

      - name: Rename Android APKs
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          mkdir -p dist_android
          
          BASE_DIR="build/app/outputs/flutter-apk"
          
          # 移动并重命名
          mv "$BASE_DIR/app-release.apk" "dist_android/LZF-Music-$VERSION-android-universal.apk"
          mv "$BASE_DIR/app-arm64-v8a-release.apk" "dist_android/LZF-Music-$VERSION-android-arm64-v8a.apk"
          mv "$BASE_DIR/app-armeabi-v7a-release.apk" "dist_android/LZF-Music-$VERSION-android-armeabi-v7a.apk"
          mv "$BASE_DIR/app-x86_64-release.apk" "dist_android/LZF-Music-$VERSION-android-x86_64.apk"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: dist_android/*.apk
          retention-days: 1

  # --- Linux 平台 ---
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev rpm patchelf locate libayatana-appindicator3-dev

      - name: Set up Flutter manually for Linux ARM64
        if: matrix.arch == 'arm64'
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - uses: subosito/flutter-action@v2
        if: matrix.arch != 'arm64'
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install fastforge
        run: dart pub global activate fastforge

      - name: Get Flutter version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare Linux packaging tools
        run: |
          sudo updatedb
          flutter config --enable-linux-desktop
          flutter pub get

      - name: Package Linux artifacts
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          mkdir -p dist_linux

          fastforge package --platform linux --targets appimage,deb,rpm

          SRC_DIR="dist/$VERSION"
          APPIMAGE_SRC=$(find "$SRC_DIR" -maxdepth 1 -type f -iname "*.appimage" | head -n 1)
          DEB_SRC=$(find "$SRC_DIR" -maxdepth 1 -type f -name "*.deb" | head -n 1)
          RPM_SRC=$(find "$SRC_DIR" -maxdepth 1 -type f -name "*.rpm" | head -n 1)

          if [[ -z "$APPIMAGE_SRC" || -z "$DEB_SRC" || -z "$RPM_SRC" ]]; then
            echo "Expected Linux packages were not all generated."
            find "$SRC_DIR" -maxdepth 1 -type f
            exit 1
          fi

          cp "$APPIMAGE_SRC" "dist_linux/LZF-Music-$VERSION-linux-${{ matrix.arch }}.AppImage"
          cp "$DEB_SRC" "dist_linux/LZF-Music-$VERSION-linux-${{ matrix.arch }}.deb"
          cp "$RPM_SRC" "dist_linux/LZF-Music-$VERSION-linux-${{ matrix.arch }}.rpm"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.arch }}
          path: |
            dist_linux/*.AppImage
            dist_linux/*.deb
            dist_linux/*.rpm
          retention-days: 1

  # --- 统一发布 ---
  create-release:
    needs: [build-apple, build-windows, build-android, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 整理文件
      - name: Prepare Release Files
        run: |
          mkdir -p release_files
          
          # 查找并移动所有相关文件
          find artifacts -name "*.dmg" -exec cp {} release_files/ \;
          find artifacts -name "*.exe" -exec cp {} release_files/ \;
          find artifacts -name "*.apk" -exec cp {} release_files/ \;
          find artifacts -name "*.ipa" -exec cp {} release_files/ \;
          find artifacts -iname "*.appimage" -exec cp {} release_files/ \;
          find artifacts -name "*.deb" -exec cp {} release_files/ \;
          find artifacts -name "*.rpm" -exec cp {} release_files/ \;
          
          echo "Listing release files:"
          ls -R release_files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            🎉 发布版本 ${{ github.ref_name }}
            
            🖥️ Windows 版本
            • 安装程序：支持 Windows 10/11 (x64)
            • 功能：自动创建桌面快捷方式
            • 智能音频控制：
            • 拔掉耳机自动暂停播放
            • 耳机按钮控制播放 / 暂停 / 切歌
            • ⌨️ 快捷键支持：
            • 空格：播放 / 暂停
            • Ctrl ⌘ + 左右方向键：快进 / 快退
            • Ctrl ⌘ + 上下方向键：上一首 / 下一首
            • 播放页面动画优化：修改了播放页面的进入动画
            • 更多状态保存：播放状态、列表位置、侧边栏状态等
            • 支持主题切换
            • 支持背景高斯模糊与透明度调整

            🍎 macOS 版本
            • Intel (x86_64)：适用于 Intel Mac
            • Apple Silicon (arm64)：适用于 M1/M2 Mac
            • 通用版 (universal)：同时支持 Intel 和 Apple Silicon
            • 智能音频控制：
            • 拔掉耳机自动暂停播放
            • 耳机按钮控制播放 / 暂停 / 切歌
            • ⌨️ 快捷键支持：
            • 空格：播放 / 暂停
            • Command ⌘ + 左右方向键：快进 / 快退
            • Command ⌘ + 上下方向键：上一首 / 下一首
            • 支持主题切换
            • 背景高斯模糊与透明度调整

            📱 iOS 版本
            • 适用版本：iOS 14 及以上
            • 智能音频控制：
            • 拔掉耳机自动暂停播放
            • 耳机 / 蓝牙按钮控制播放 / 暂停 / 切歌
            • 控制中心播放支持
            • 背景播放支持
            • 支持主题切换
            • 支持小组件显示当前播放歌曲及控制

            🐧 Linux 版本
            • 架构：x64 / arm64
            • 发布格式：AppImage / deb / rpm
            • AppImage：下载后赋予可执行权限即可运行
            • deb / rpm：适用于对应发行版的包管理器安装
            • 支持主题切换
            • 背景高斯模糊与透明度调整

            ✨ 更新内容
            • 支持按照添加时间排序
            • 支持批量选择删除
            • 优化音频播放稳定性与耳机控制体验
            • 新增支持 M4A 与 ALAC 格式的比特率与采样率读取
            • 支持系统托盘与后台运行
            • 新增播放状态保存：退出应用后自动保存播放进度、音量、播放模式
            • 新增自动定位当前歌曲：切换歌曲时列表自动滚动到当前播放位置
            • 新增歌曲导入进度显示：可查看导入的实时进度与完成状态
            • 新增歌词功能：支持 LRC、TTML 格式解析，支持逐字歌词显示
            • 新增封面导入功能：支持选择图片覆盖旧封面
            • 播放页面动画优化，更多状态保存（列表位置、侧边栏展开状态）
            • 支持主题切换
            • 支持背景高斯模糊与透明度调整

            ⸻

            🎉 Release ${{ github.ref_name }}

            🖥️ Windows
            • Installer: Supports Windows 10/11 (x64)
            • Feature: Auto-create desktop shortcut
            • Smart Audio Control:
            • Auto-pause when headphones are unplugged
            • Headset buttons for play / pause / next / previous
            • ⌨️ Keyboard Shortcuts:
            • Space: Play / Pause
            • Ctrl ⌘ + Left/Right Arrow: Seek backward / forward
            • Ctrl ⌘ + Up/Down Arrow: Previous / Next track
            • Playback page animation optimized
            • More state persistence: playback state, playlist position, sidebar state
            • Theme switching support
            • Background blur & transparency adjustment

            🍎 macOS
            • Intel (x86_64): for Intel-based Macs
            • Apple Silicon (arm64): for M1/M2 Macs
            • Universal: supports both Intel & Apple Silicon
            • Smart Audio Control:
            • Auto-pause when headphones are unplugged
            • Headset buttons for play / pause / next / previous
            • ⌨️ Keyboard Shortcuts:
            • Space: Play / Pause
            • Command ⌘ + Left/Right Arrow: Seek backward / forward
            • Command ⌘ + Up/Down Arrow: Previous / Next track
            • Theme switching support
            • Background blur & transparency adjustment

            📱 iOS
            • Supported: iOS 14+
            • Smart Audio Control:
            • Auto-pause when headphones are unplugged
            • Headset / Bluetooth buttons for play / pause / next / previous
            • Control Center playback support
            • Background playback support
            • Theme switching support
            • Home screen widget shows current track & controls

            🐧 Linux
            • Architectures: x64 / arm64
            • Release formats: AppImage / deb / rpm
            • AppImage: make it executable before running
            • deb / rpm: install with the matching distro package manager
            • Theme switching support
            • Background blur & transparency adjustment

            ✨ What’s New
            • Support sorting by added time
            • Batch delete support
            • Improved audio playback stability & headset control experience
            • Added support for M4A & ALAC bitrate and sample rate parsing
            • Added system tray integration and background running support
            • New: Playback state persistence (save progress, volume, and play mode when exiting)
            • New: Auto-scroll to current song in playlist when switching tracks
            • New: Song import progress indicator (view real-time progress and completion status)
            • New: Lyrics support — parse LRC & TTML formats, with word-by-word synchronized lyrics
            • New: Cover import — select an image to overwrite existing album art
            • Playback page animation optimized, more state persistence (playlist position, sidebar state)
            • Theme switching support

            <img src="https://github.com/user-attachments/assets/8d5b9065-8cd8-4b1e-bb6e-32b9ae5f0f25" height="500">
          files: release_files/*
